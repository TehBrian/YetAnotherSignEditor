help: |-
  <gray>--- <white>YetAnotherSignEditor</white> ---
  <yellow>/yase set <line> [<text>]
  <gray>   Set the text of the targeted sign.
  <green>/yase copy
  <gray>   Copy the text of the targeted sign.
  <aqua>/yase unwax
  <gray>   Unwax the targeted sign.
  <light_purple>/yase format [<formatting-type>]
  <gray>   Toggle text formatting, or change your formatting type.
  <red>/yase reload
  <gray>   Reload the plugin's config.

set:
  not-a-sign: "<gold>That's not a sign."
  no-permission-here: "<gold>You don't have permission to do that here."

copy:
  message: |-
    <green>Sign at <dark_green><x></dark_green>, <dark_green><y></dark_green>, <dark_green><z></dark_green>. <gray>(Click a line to copy it.)
    <reset><line_0>
    <reset><line_1>
    <reset><line_2>
    <reset><line_3>
  hover: |-
    <reset><line>

    <gray>Click to copy to clipboard.
  not-a-sign: "<dark_green>That's not a sign."

unwax:
  not-a-sign: "<dark_aqua>That's not a sign."
  not-waxed: "<dark_aqua>That sign isn't waxed."
  no-permission-here: "<dark_aqua>You don't have permission to do that here."

format:
  enabled: "<light_purple>Enabled sign formatting. <gray>(Insert formatting codes into text.)"
  disabled: "<dark_purple>Disabled sign formatting."
  set: "<light_purple>Set your formatting type to <dark_purple><formatting_type></dark_purple>."

reload:
  success: "<red>The configuration has been successfully reloaded."
  failure: "<dark_red>Failed to load configuration; please check the console."

# No touch!
version: 1
